name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-2025
    timeout-minutes: 30
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: 'true'
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
      - name: Restore
        shell: pwsh
        run: dotnet restore LFTPPilot.slnx --locked-mode
      - name: Build
        shell: pwsh
        run: dotnet build LFTPPilot.slnx --configuration Release --no-restore
      - name: Test
        shell: pwsh
        run: dotnet test tests/LFTPPilot.Tests/LFTPPilot.Tests.csproj --configuration Release --no-build --no-restore
      - name: Test release tools
        shell: powershell
        run: Get-ChildItem ./build/tests/*.Tests.ps1 | Sort-Object Name | ForEach-Object { & $_.FullName }
      - name: Confirm workflows use immutable action revisions
        shell: pwsh
        run: |
          $bad = Get-ChildItem .github/workflows -File | Select-String -Pattern 'uses:\s+[^#\s]+@(?![0-9a-f]{40}(?:\s|$))'
          if ($bad) { $bad | Out-String | Write-Error; exit 1 }
